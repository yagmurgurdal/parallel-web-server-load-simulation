services:
  server:
    build:
      context: ./server
    container_name: parallel-web-server
    environment:
      PORT: 3000
      SIMULATION_DELAY_MS: 100
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 5s
      timeout: 3s
      retries: 10

  load_tester:
    build:
      context: ./load_tester
    container_name: parallel-load-tester
    environment:
      TARGET_BASE_URL: http://server:3000
      SIMULATION_DELAY_MS: 100
      REQUEST_TIMEOUT_SECONDS: 30
    depends_on:
      server:
        condition: service_healthy
    volumes:
      - ./results:/app/results
    command: ["python", "load_test.py"]
